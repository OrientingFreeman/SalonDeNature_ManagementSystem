{% extends "base.html" %}

{% block title %}{{ text.signup }}{% endblock %}

{% block content %}

<section class="auth-section customer-auth-section">
    <div class="auth-card">
        <div class="language-switcher auth-language">
            <a href="/signup?lang=ko">Korean</a>
            <span>|</span>
            <a href="/signup?lang=en">English</a>
        </div>

        <p class="eyebrow">CUSTOMER ACCOUNT</p>
        <h1>{{ text.signup }}</h1>

        <form method="POST" action="/signup?lang={{ lang }}" class="auth-form">
            <label for="name">{{ text.name }}</label>
            <input id="name" type="text" name="name" required autocomplete="name">

            <label for="phone">{{ text.phone }}</label>
            <input id="phone" type="text" name="phone" required autocomplete="tel">

            <label for="password">{{ text.password }}</label>
            <input id="password" type="password" name="password" required autocomplete="new-password">

            <div class="policy-agree">
                <label class="policy-agree-label" for="agree_policy">
                    <input
                        id="agree_policy"
                        class="policy-checkbox"
                        type="checkbox"
                        name="agree_policy"
                        required
                    >
                    <span>
                        I agree to the
                        <a href="/privacy" target="_blank">Privacy Policy</a>
                        and
                        <a href="/terms" target="_blank">Terms of Service</a>.
                    </span>
                </label>
            </div>

            <button type="submit" class="btn-primary auth-submit">{{ text.signup }}</button>
        </form>

        <p class="auth-link-text">
            {{ text.already_have_account }}
            <a href="/login?lang={{ lang }}">{{ text.login }}</a>
        </p>
    </div>
</section>

<style>
.auth-section{
    min-height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 24px;
}
.auth-card{
    width:min(460px, 100%);
    background:white;
    border-radius:22px;
    padding:44px;
    box-shadow:0 4px 24px rgba(0,0,0,.08);
}
.auth-card h1{
    margin:8px 0 24px;
    color:var(--forest);
    font-size:44px;
}
.auth-language{
    margin:0 0 24px;
    text-align:right;
}
.auth-form label{
    display:block;
    margin:18px 0 8px;
    color:var(--forest);
    font-weight:700;
}
.auth-form input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}
.auth-submit{
    width:100%;
    margin-top:30px;
}
.auth-link-text{
    margin:24px 0 0;
    text-align:center;
    color:#777;
}
.auth-link-text a{
    color:var(--forest);
    font-weight:800;
}

.auth-form .policy-agree {
    margin: 22px 0 8px;
}

.auth-form .policy-agree-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 0;
    color: var(--forest);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.6;
    cursor: pointer;
}

.auth-form .policy-agree-label .policy-checkbox {
    width: auto;
    min-width: 16px;
    height: 16px;
    margin: 4px 0 0;
    padding: 0;
    flex-shrink: 0;
}

.auth-form .policy-agree-label span {
    display: inline;
}

.auth-form .policy-agree-label a {
    color: var(--forest);
    font-weight: 800;
    text-decoration: underline;
    text-underline-offset: 2px;
}

</style>

{% endblock %}
