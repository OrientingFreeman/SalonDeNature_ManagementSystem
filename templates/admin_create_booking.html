{% extends "base.html" %}

{% block title %}관리자 예약 생성{% endblock %}

{% block content %}
<h1>관리자 예약 생성</h1>

<form method="POST" action="/admin/bookings/create">

<p>
    기존 고객:
    <select name="customer_id" id="customerSelect" onchange="toggleNewCustomerForm()">
        <option value="">신규 고객으로 입력</option>
        {% for customer in customers %}
            <option value="{{ customer.id }}">
                {{ customer.name }} / {{ customer.phone }}
            </option>
        {% endfor %}
    </select>
</p>

<div id="newCustomerForm">
    <p>
        신규 고객 이름:
        <input type="text" name="new_customer_name">
    </p>

    <p>
        신규 고객 연락처:
        <input type="text" name="new_customer_phone">
    </p>
</div>


    <p>
        직원:
        <select name="staff_id" id="staffSelect" required>
            <option value="any">직원 지정 안함</option>
            {% for staff in staff_list %}
                <option value="{{ staff.id }}">
                    {{ staff.name }}
                </option>
            {% endfor %}
        </select>
    </p>

    <p>
        시술:
        <select name="service_id" id="serviceSelect" required>
            {% for service in services %}
                <option value="{{ service.id }}">
                    [{{ service.category }}] {{ service.name_ko }}
                    / {{ service.duration_minutes }}분
                    / {{ service.price }}원
                </option>
            {% endfor %}
        </select>
    </p>

    <p>
                예약 날짜:
        <input type="date" id="bookingDate" required>
    </p>

    <p>
              예약 가능 시간:
        <select name="start_time" id="availableSlotSelect" required>
          <option value="">직원/시술/날짜를 선택하세요</option>
        </select>
    </p>

    <button type="submit">예약 생성</button>

</form>

<p>
    <a href="/admin/calendar">예약 캘린더로 돌아가기</a>
</p>



<script>
function toggleNewCustomerForm() {
    const customerSelect = document.getElementById("customerSelect");
    const newCustomerForm = document.getElementById("newCustomerForm");

    if (customerSelect.value) {
        newCustomerForm.style.display = "none";
    } else {
        newCustomerForm.style.display = "block";
    }
}

document.addEventListener("DOMContentLoaded", toggleNewCustomerForm);
</script>

<script>
function toggleNewCustomerForm() {
    const customerSelect = document.getElementById("customerSelect");
    const newCustomerForm = document.getElementById("newCustomerForm");

    if (customerSelect.value) {
        newCustomerForm.style.display = "none";
    } else {
        newCustomerForm.style.display = "block";
    }
}
    
async function loadAvailableSlots() {
    const staffId = document.getElementById("staffSelect").value;
    const serviceId = document.getElementById("serviceSelect").value;
    const date = document.getElementById("bookingDate").value;
    const slotSelect = document.getElementById("availableSlotSelect");
    
    slotSelect.innerHTML = '<option value="">조회 중...</option>';
    
    if (!staffId || !serviceId || !date) {
        slotSelect.innerHTML = '<option value="">직원/시술/날짜를 선택하세요</option>';
        return;
    }
    
    
    if (staffId === "any") {

    const response = await fetch(
        `/api/bookings/available-slots-any?service_id=${serviceId}&date=${date}`
    );

    const data = await response.json();

    slotSelect.innerHTML = "";

    if (!data.available_slots.length) {
        slotSelect.innerHTML =
            '<option value="">예약 가능 시간 없음</option>';
        return;
    }

    data.available_slots.forEach(slot => {

        const option =
            document.createElement("option");

        option.value =
            `${date}T${slot}`;

        option.textContent = slot;

        slotSelect.appendChild(option);

    });

    return;
    }
    
    

    const url = `/api/bookings/available-slots?staff_id=${staffId}&service_id=${serviceId}&date=${date}`;

    const response = await fetch(url);
    const data = await response.json();

    slotSelect.innerHTML = "";

    if (!data.ok) {
        slotSelect.innerHTML = `<option value="">${data.message || "조회 실패"}</option>`;
        return;
    }

    if (data.available_slots.length === 0) {
        slotSelect.innerHTML = '<option value="">예약 가능한 시간이 없습니다</option>';
        return;
    }

    data.available_slots.forEach(function(slot) {
        const option = document.createElement("option");
        option.value = `${date}T${slot}`;
        option.textContent = slot;
        slotSelect.appendChild(option);
    });
}

document.addEventListener("DOMContentLoaded", function() {
    toggleNewCustomerForm();

    document.getElementById("staffSelect").addEventListener("change", loadAvailableSlots);
    document.getElementById("serviceSelect").addEventListener("change", loadAvailableSlots);
    document.getElementById("bookingDate").addEventListener("change", loadAvailableSlots);
});
</script>
{% endblock %}
