{% extends "base.html" %}

{% block title %}Admin Create Booking{% endblock %}

{% block content %}

{% if request.args.get("embed") == "1" %}
<style>
    .navbar{
        display:none !important;
    }

    body{
        padding-top:0 !important;
    }

    .admin-create-booking-section{
        margin-top:24px !important;
    }
</style>
{% endif %}


<section class="admin-create-booking-section">

    <div class="admin-page-header compact">
        <p class="eyebrow">관리자 예약</p>
        <h1>예약 등록</h1>
        <p>관리자 캘린더에서 예약을 직접 등록합니다.</p>
    </div>

    <form method="POST"
      action="/admin/bookings/create{% if request.args.get('embed') == '1' %}?embed=1{% endif %}"
      class="admin-form-card admin-booking-create-card">

        <div class="booking-create-group">
            <h2>고객</h2>

            <label for="customerSelect">기존 고객</label>
            <select name="customer_id" id="customerSelect">
                <option value="">신규 고객으로 등록</option>
                {% for customer in customers %}
                    <option value="{{ customer.id }}">
                        {{ customer.name }} / {{ customer.phone }}
                    </option>
                {% endfor %}
            </select>

            <div id="newCustomerForm" class="new-customer-box">
                <div class="form-grid two-columns">
                    <div>
                        <label for="new_customer_name">신규 고객명</label>
                        <input id="new_customer_name" type="text" name="new_customer_name">
                    </div>

                    <div>
                        <label for="new_customer_phone">신규 고객 연락처</label>
                        <input id="new_customer_phone" type="text" name="new_customer_phone">
                    </div>
                </div>
            </div>
        </div>

        <div class="booking-create-group">
            <h2>서비스 배정</h2>

            <div class="form-grid two-columns">
                <div>
                    <label for="staffSelect">직원</label>
                    <select name="staff_id" id="staffSelect" required>
                        <option value="any">가능한 직원 자동 배정</option>
                        {% for staff in staff_list %}
                            <option value="{{ staff.id }}">
                                {{ staff.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="serviceSelect">서비스</label>
                    <select name="service_id" id="serviceSelect" required>
                        {% for service in services %}
                            <option value="{{ service.id }}">
                                [{{ service.category }}] {{ service.name_ko }}
                                / {{ service.duration_minutes }} min
                                / ₩{{ "{:,}".format(service.price) }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="booking-create-group">
            <h2>예약 시간</h2>

            <div class="form-grid two-columns">
                <div>
                    <label for="bookingDate">예약 날짜</label>
                    <input type="date" id="bookingDate" required>
                </div>

                <div>
                    <label for="availableSlotSelect">예약 가능 시간</label>
                    <select name="start_time" id="availableSlotSelect" required>
                        <option value="">직원, 서비스, 날짜를 선택하세요.</option>
                    </select>
                </div>
            </div>

            <p class="booking-create-help">
                직원 근무 일정, 담당 서비스, 기존 예약 및 서비스 소요 시간을 기준으로 예약 가능 시간이 계산됩니다.
            </p>
        </div>

        <div class="admin-form-actions">
            <a href="/admin/calendar{% if request.args.get('embed') == '1' %}?embed=1{% endif %}" class="booking-action-btn">캘린더로 돌아가기</a>
            <button type="submit" class="btn-primary">예약 등록</button>
        </div>

    </form>

</section>

<style>
.admin-create-booking-section{
    max-width:860px;
    margin:50px auto;
    padding:0 24px;
}

.admin-page-header.compact{
    margin-bottom:28px;
}

.admin-page-header.compact h1{
    font-size:42px;
}

.admin-booking-create-card{
    padding:34px;
}

.booking-create-group{
    padding-bottom:28px;
    margin-bottom:28px;
    border-bottom:1px solid #eee;
}

.booking-create-group:last-of-type{
    border-bottom:none;
    margin-bottom:0;
}

.booking-create-group h2{
    margin:0 0 18px;
    color:var(--forest);
    font-size:24px;
}

.admin-booking-create-card label{
    display:block;
    margin-bottom:8px;
    color:var(--forest);
    font-weight:700;
}

.admin-booking-create-card input,
.admin-booking-create-card select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
    background:white;
}

.admin-booking-create-card .form-grid.two-columns{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:20px;
}

.new-customer-box{
    margin-top:20px;
    padding:20px;
    border-radius:16px;
    background:#F9F7F2;
}

.booking-create-help{
    margin:14px 0 0;
    color:#777;
    font-size:14px;
}

@media(max-width:768px){
    .admin-create-booking-section{
        margin:36px auto;
        padding:0 18px;
    }

    .admin-booking-create-card{
        padding:26px;
    }

    .admin-booking-create-card .form-grid.two-columns{
        grid-template-columns:1fr;
    }

    .admin-form-actions{
        flex-direction:column;
    }

    .admin-form-actions a,
    .admin-form-actions button{
        width:100%;
        text-align:center;
    }
}
</style>

<script>
function toggleNewCustomerForm() {
    const customerSelect = document.getElementById("customerSelect");
    const newCustomerForm = document.getElementById("newCustomerForm");
    const newCustomerName = document.getElementById("new_customer_name");

    if (customerSelect.value) {
        newCustomerForm.style.display = "none";
        newCustomerName.required = false;
    } else {
        newCustomerForm.style.display = "block";
        newCustomerName.required = true;
    }
}

async function loadAvailableSlots() {
    const staffId = document.getElementById("staffSelect").value;
    const serviceId = document.getElementById("serviceSelect").value;
    const date = document.getElementById("bookingDate").value;
    const slotSelect = document.getElementById("availableSlotSelect");

    slotSelect.innerHTML = '<option value="">Loading...</option>';

    if (!staffId || !serviceId || !date) {
        slotSelect.innerHTML = '<option value="">Select staff, service, and date</option>';
        return;
    }

    try {
        let url;

        if (staffId === "any") {
            url = `/api/bookings/available-slots-any?service_id=${serviceId}&date=${date}`;
        } else {
            url = `/api/bookings/available-slots?staff_id=${staffId}&service_id=${serviceId}&date=${date}`;
        }

        const response = await fetch(url);
        const data = await response.json();

        slotSelect.innerHTML = "";

        if (!data.ok && staffId !== "any") {
            slotSelect.innerHTML = `<option value="">${data.message || "예약 가능 시간을 불러오지 못했습니다."}</option>`;
            return;
        }

        if (!data.available_slots || data.available_slots.length === 0) {
            slotSelect.innerHTML = '<option value="">No available slots</option>';
            return;
        }

        data.available_slots.forEach(function(slot) {
            const option = document.createElement("option");
            option.value = `${date}T${slot}`;
            option.textContent = slot;
            slotSelect.appendChild(option);
        });
    } catch (error) {
        slotSelect.innerHTML = '<option value="">Failed to load slots</option>';
    }
}

document.addEventListener("DOMContentLoaded", function() {
    toggleNewCustomerForm();

    document.getElementById("customerSelect").addEventListener("change", toggleNewCustomerForm);
    document.getElementById("staffSelect").addEventListener("change", loadAvailableSlots);
    document.getElementById("serviceSelect").addEventListener("change", loadAvailableSlots);
    document.getElementById("bookingDate").addEventListener("change", loadAvailableSlots);
});
</script>

{% endblock %}
