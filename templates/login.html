{% extends "base.html" %}

{% block title %}{{ text.login }}{% endblock %}

{% block content %}

<section class="auth-section customer-auth-section">
    <div class="auth-card">
        <div class="language-switcher auth-language">
            <a href="/login?lang=ko">Korean</a>
            <span>|</span>
            <a href="/login?lang=en">English</a>
        </div>

        <p class="eyebrow">CUSTOMER ACCESS</p>
        <h1>{{ text.login }}</h1>

        <form method="POST" action="/login?lang={{ lang }}" class="auth-form">
            <label for="phone">{{ text.phone }}</label>
            <input id="phone" type="text" name="phone" required autocomplete="tel">

            <label for="password">{{ text.password }}</label>
            <input id="password" type="password" name="password" required autocomplete="current-password">

            <button type="submit" class="btn-primary auth-submit">{{ text.login }}</button>
        </form>

        <div class="social-login-section">

        <a href="{{ url_for('auth.kakao_login') }}" class="kakao-login-btn">
            <span class="social-icon">💬</span>
            <span>Continue with Kakao</span>
        </a>

        <a href="/google/login" class="google-login-btn">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.72 1.22 9.22 3.62l6.87-6.87C35.9 2.3 30.37 0 24 0 14.64 0 6.56 5.38 2.61 13.22l8 6.21C12.47 13.58 17.76 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.5 24.55c0-1.64-.15-3.21-.41-4.73H24v9h12.66c-.55 2.96-2.22 5.47-4.74 7.16l7.27 5.64C43.45 37.65 46.5 31.71 46.5 24.55z"/>
                <path fill="#FBBC05" d="M10.61 28.57A14.5 14.5 0 0 1 9.84 24c0-1.59.28-3.13.77-4.57l-8-6.21A24.01 24.01 0 0 0 0 24c0 3.87.93 7.52 2.61 10.78l8-6.21z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.91-2.14 15.88-5.82l-7.27-5.64c-2.02 1.35-4.61 2.14-8.61 2.14-6.24 0-11.53-4.08-13.39-9.93l-8 6.21C6.56 42.62 14.64 48 24 48z"/>
            </svg>
            <span>Continue with Google</span>
        </a>

        </div>

        <p class="auth-link-text">
            {{ text.no_account }}
            <a href="/signup?lang={{ lang }}">{{ text.signup }}</a>
        </p>
    </div>
</section>

<style>
.auth-section{
    min-height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 24px;
}
.auth-card{
    width:min(460px, 100%);
    background:white;
    border-radius:22px;
    padding:44px;
    box-shadow:0 4px 24px rgba(0,0,0,.08);
}
.auth-card h1{
    margin:8px 0 24px;
    color:var(--forest);
    font-size:44px;
}
.auth-language{
    margin:0 0 24px;
    text-align:right;
}
.auth-form label{
    display:block;
    margin:18px 0 8px;
    color:var(--forest);
    font-weight:700;
}
.auth-form input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}
.auth-submit{
    width:100%;
    margin-top:30px;
}
.kakao-login-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:14px;
    padding:14px;
    border-radius:12px;
    background:#FEE500;
    color:#191919;
    font-weight:800;
}
.auth-link-text{
    margin:24px 0 0;
    text-align:center;
    color:#777;
}
.auth-link-text a{
    color:var(--forest);
    font-weight:800;
}
</style>

{% endblock %}
