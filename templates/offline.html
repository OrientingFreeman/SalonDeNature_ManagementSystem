<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f4f46">
  <title>Offline · Salon De Nature</title>
  <link rel="icon" href="/static/pwa/icons/icon-192.png">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f7f4ec;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.offline{max-width:600px;margin:8vh auto;padding:40px 24px;text-align:center}.offline img{width:112px;height:112px;border-radius:24px}.eyebrow{margin:22px 0 8px;color:#1f4f46;font-size:12px;font-weight:800;letter-spacing:.18em}.offline h1{margin:0 0 12px}.copy{color:#667085;line-height:1.65}.offline button{margin-top:12px;border:0;border-radius:10px;padding:11px 16px;background:#1f4f46;color:#fff;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <main class="offline">
    <img src="/static/pwa/icons/icon-192.png" alt="Salon De Nature">
    <p class="eyebrow">OFFLINE</p>
    <h1>인터넷 연결을 확인해 주세요</h1>
    <p class="copy">예약과 고객 정보는 최신 상태 확인이 필요하므로 오프라인에서는 표시하지 않습니다.</p>
    <button type="button" onclick="window.location.reload()">다시 시도</button>
  </main>
</body>
</html>
