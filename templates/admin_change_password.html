{% extends "base.html" %}

{% block title %}Admin Change Password{% endblock %}

{% block content %}

<section class="admin-services-section account-password-section">

    <div class="admin-page-header">
        <p class="eyebrow">관리자 계정</p>
        <h1>비밀번호 변경</h1>
        <p>계정 비밀번호를 변경합니다. 비밀번호는 8자 이상이어야 합니다.</p>
    </div>

    <div class="admin-form-card password-card">
        <form method="POST" class="password-form">

            <div class="password-form-group">
                <label for="current_password">현재 비밀번호</label>
                <input
                    id="current_password"
                    type="password"
                    name="current_password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="password-form-group">
                <label for="new_password">새 비밀번호</label>
                <input
                    id="new_password"
                    type="password"
                    name="new_password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                >
            </div>

            <div class="password-form-group">
                <label for="confirm_password">새 비밀번호 확인</label>
                <input
                    id="confirm_password"
                    type="password"
                    name="confirm_password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                >
            </div>

            <p class="password-help">
                비밀번호 변경 후 다음 로그인부터 새 비밀번호를 사용하세요.
            </p>

            <div class="admin-form-actions password-actions">
                <a href="/admin" class="booking-action-btn">뒤로</a>
                <button type="submit" class="btn-primary">비밀번호 변경</button>
            </div>

        </form>
    </div>

</section>

<style>
.account-password-section{
    max-width:760px;
}

.password-card{
    max-width:640px;
    margin:0 auto;
    padding:44px;
}

.password-form-group{
    margin-bottom:22px;
}

.password-form-group label{
    display:block;
    margin-bottom:8px;
    color:var(--forest);
    font-weight:700;
}

.password-form-group input{
    width:100%;
    padding:15px 16px;
    border:1px solid #ddd;
    border-radius:14px;
    font-size:15px;
    background:white;
}

.password-form-group input:focus{
    outline:none;
    border-color:var(--forest);
    box-shadow:0 0 0 3px rgba(26,60,52,.08);
}

.password-help{
    margin:8px 0 0;
    padding:16px;
    border-radius:14px;
    background:#F9F7F2;
    color:#777;
    font-size:14px;
}

.password-actions{
    margin-top:30px;
}

@media(max-width:768px){
    .password-card{
        padding:28px;
    }

    .password-actions{
        flex-direction:column;
    }

    .password-actions a,
    .password-actions button{
        width:100%;
        text-align:center;
    }
}
</style>

{% endblock %}
